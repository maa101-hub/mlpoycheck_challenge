<header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-6">
  <!-- Search -->
  <div class="flex items-center bg-gray-50/80 rounded-xl px-4 py-2.5 gap-2.5 ring-1 ring-black/[0.03] w-full max-w-md">
    <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
    </svg>
    <input type="text" placeholder="Search records, UIDs, or employees..." class="bg-transparent text-sm outline-none w-full text-gray-700 placeholder:text-gray-400">
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-4">
    <!-- Notification Bell -->
    <button class="relative w-9 h-9 rounded-xl bg-gray-50 ring-1 ring-black/[0.03] flex items-center justify-center hover:bg-gray-100 transition-all duration-500" style="transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1)">
      <svg class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
      </svg>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-primary-600 rounded-full"></span>
    </button>

    <!-- Help -->
    <button class="w-9 h-9 rounded-xl bg-gray-50 ring-1 ring-black/[0.03] flex items-center justify-center hover:bg-gray-100 transition-all duration-500" style="transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1)">
      <svg class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
      </svg>
    </button>

    <!-- Profile -->
    <div class="flex items-center gap-3 pl-3 border-l border-gray-100">
      <div class="text-right">
        <p class="text-sm font-semibold text-gray-900 leading-tight">{{ userName }}</p>
        <button (click)="logout()" class="text-[11px] text-primary-600 font-medium hover:text-primary-800 transition-colors duration-300">Logout</button>
      </div>
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-600 to-primary-800 flex items-center justify-center ring-2 ring-primary-100">
        <span class="text-white text-xs font-bold">A</span>
      </div>
    </div>
  </div>
</header>
